name: SharpSV

channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda

dependencies:
  - python=3.8.20

  - numpy=1.24.4
  - pandas=2.0.3
  - scipy=1.10.1
  - matplotlib=3.7.3
  - scikit-learn=1.3.2

  - pysam=0.22.1
  - biopython=1.83
  - numba=0.58.1

  - tqdm=4.66.5
  - hyperopt=0.2.7

  # PyTorch
  - pytorch=2.4.1
  - torchvision=0.19.1
  - torchaudio=2.4.1
  - pytorch-cuda=11.8

  # Lightning
  - pytorch-lightning=2.4.0

  - pip
  - pip:
      # Keep Ray on pip; the conda ray-tune package is a common solver failure point.
      # Python 3.8 package indexes commonly stop at Ray 2.10.x.
      - ray[tune]==2.10.0
