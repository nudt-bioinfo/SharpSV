{% set name = "sharpsv" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv"

requirements:
  host:
    - python >=3.8,<3.9
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=3.8,<3.9
    - numpy 1.24.4
    - pandas 2.0.3
    - pysam 0.22.1
    - numba 0.58.1
    - scipy 1.10.1
    - matplotlib 3.7.3
    - biopython 1.83
    - scikit-learn 1.3.2
    - tqdm 4.67.3
    - hyperopt 0.2.7
    - ray-tune 2.23.0
    - pytorch 2.4.*
    - torchvision 0.19.*
    - torchaudio 2.4.*
    - pytorch-lightning 2.4.*

test:
  commands:
    - SharpSV --help

about:
  home: https://github.com/sharpsv/sharpsv
  summary: Structural variant discovery pipeline with bundled stage models and native backend
  license: MIT
  license_file: LICENSE
