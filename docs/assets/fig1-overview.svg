<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title desc">
  <title id="title">Fig. 1 | Overview of SharpSV for structural variant discovery from short-read sequencing data</title>
  <desc id="desc">A vector workflow diagram showing the five manuscript-aligned components of SharpSV: alignment patterns, coarse screening, sequence-to-image encoding, spatial-sequential recognition, and breakpoint refinement.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .panel { fill: #ffffff; stroke: #d7dee7; stroke-width: 2; rx: 24; ry: 24; }
      .panel-soft { fill: #fbfdff; stroke: #e6ecf2; stroke-width: 1.5; rx: 16; ry: 16; }
      .arrow { stroke: #5c7388; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .minor { stroke: #95a6b8; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .label { font: 700 34px 'Helvetica Neue', Arial, sans-serif; fill: #10273b; }
      .title { font: 700 30px 'Helvetica Neue', Arial, sans-serif; fill: #16324a; }
      .subtitle { font: 500 18px 'Helvetica Neue', Arial, sans-serif; fill: #4d6175; }
      .body { font: 500 17px 'Helvetica Neue', Arial, sans-serif; fill: #30485d; }
      .tiny { font: 600 14px 'Helvetica Neue', Arial, sans-serif; fill: #557086; }
      .chip { font: 700 13px 'Helvetica Neue', Arial, sans-serif; fill: #ffffff; }
      .track { stroke: #d9e3ec; stroke-width: 3; }
      .readA { fill: #4f8ef7; }
      .readB { fill: #6bcf8d; }
      .readC { fill: #f29d49; }
      .readD { fill: #df6b79; }
      .muted { fill: #9db0c3; }
      .tile1 { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; }
      .tile2 { fill: #eefcf3; stroke: #8ad6a5; stroke-width: 1.5; }
      .tile3 { fill: #fff5ea; stroke: #f6b26b; stroke-width: 1.5; }
      .tile4 { fill: #fff0f3; stroke: #ef9aa7; stroke-width: 1.5; }
      .stageB { fill: #dff1ff; }
      .stageC { fill: #ecf8f0; }
      .stageD { fill: #fff4e5; }
      .stageE { fill: #fcecf1; }
      .dark { fill: #16324a; }
      .matrixLine { stroke: #8fb0cc; stroke-width: 1.2; opacity: .85; }
      .heat1 { fill: #a8d0ff; }
      .heat2 { fill: #77b0ff; }
      .heat3 { fill: #4f8ef7; }
      .heat4 { fill: #2e6fce; }
      .signal { stroke: #2d5b88; stroke-width: 2.8; fill: none; }
      .signal2 { stroke: #2d8a58; stroke-width: 2.8; fill: none; }
      .signal3 { stroke: #d27b23; stroke-width: 2.8; fill: none; }
      .signal4 { stroke: #c94e66; stroke-width: 2.8; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#5c7388"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16324a"/>
      <stop offset="100%" stop-color="#285783"/>
    </linearGradient>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1040"/>
  <rect x="40" y="30" width="1720" height="980" rx="30" ry="30" fill="#ffffff" stroke="#d9e3ec" stroke-width="2.5"/>
  <rect x="40" y="30" width="1720" height="90" rx="30" ry="30" fill="url(#headerGrad)"/>
  <text x="86" y="88" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">
    Fig. 1 | Overview of SharpSV for structural variant discovery from short-read sequencing data
  </text>

  <!-- Layout guides -->
  <rect class="panel" x="70" y="150" width="280" height="790"/>
  <rect class="panel" x="390" y="150" width="300" height="790"/>
  <rect class="panel" x="730" y="150" width="320" height="790"/>
  <rect class="panel" x="1090" y="150" width="320" height="790"/>
  <rect class="panel" x="1450" y="150" width="280" height="790"/>

  <!-- a -->
  <circle cx="108" cy="194" r="22" fill="#16324a"/>
  <text x="100" y="203" class="label" fill="#ffffff">a</text>
  <text x="145" y="200" class="title">Read-alignment patterns</text>
  <text x="145" y="228" class="subtitle">Normal versus variant-containing regions</text>

  <rect class="panel-soft" x="96" y="265" width="230" height="110"/>
  <text x="112" y="292" class="tiny">Normal region</text>
  <line x1="118" y1="317" x2="304" y2="317" class="track"/>
  <line x1="118" y1="344" x2="304" y2="344" class="track"/>
  <rect x="132" y="306" width="56" height="14" rx="7" class="readA"/>
  <rect x="210" y="333" width="64" height="14" rx="7" class="readB"/>
  <rect x="192" y="306" width="66" height="14" rx="7" class="readA"/>
  <rect x="120" y="333" width="58" height="14" rx="7" class="readB"/>
  <line x1="188" y1="313" x2="210" y2="340" class="minor"/>
  <line x1="178" y1="340" x2="192" y2="313" class="minor"/>
  <text x="112" y="365" class="body">Concordant pairs dominate</text>

  <rect class="panel-soft" x="96" y="405" width="230" height="145"/>
  <text x="112" y="432" class="tiny">Variant-containing region</text>
  <line x1="118" y1="462" x2="304" y2="462" class="track"/>
  <line x1="118" y1="492" x2="304" y2="492" class="track"/>
  <line x1="118" y1="522" x2="304" y2="522" class="track"/>
  <rect x="128" y="451" width="52" height="14" rx="7" class="readC"/>
  <rect x="242" y="481" width="48" height="14" rx="7" class="readD"/>
  <rect x="146" y="511" width="60" height="14" rx="7" class="readC"/>
  <path d="M180 458 L230 458" class="minor"/>
  <path d="M230 458 L246 488" class="minor"/>
  <path d="M206 518 L248 488" class="minor"/>
  <path d="M126 450 q18 -24 36 0" class="signal4"/>
  <path d="M258 480 q16 -22 32 0" class="signal3"/>
  <rect x="206" y="446" width="14" height="80" rx="7" fill="#ffd5da" stroke="#ef9aa7" stroke-width="2"/>
  <text x="226" y="472" class="body">split reads</text>
  <text x="226" y="499" class="body">discordant pairs</text>
  <text x="226" y="526" class="body">candidate breakpoint</text>

  <rect class="panel-soft" x="96" y="595" width="230" height="125"/>
  <text x="114" y="623" class="tiny">Signal abstraction</text>
  <rect x="120" y="642" width="28" height="54" rx="5" class="tile1"/>
  <rect x="155" y="642" width="28" height="54" rx="5" class="tile2"/>
  <rect x="190" y="642" width="28" height="54" rx="5" class="tile3"/>
  <rect x="225" y="642" width="28" height="54" rx="5" class="tile4"/>
  <rect x="260" y="642" width="28" height="54" rx="5" fill="#f0f4f8" stroke="#b8c7d6" stroke-width="1.5"/>
  <text x="118" y="715" class="body">Fragmented evidence becomes the input</text>
  <text x="118" y="739" class="body">for structured site-wise modeling.</text>

  <!-- arrow a->b -->
  <path d="M350 545 C365 545 370 545 390 545" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- b -->
  <circle cx="428" cy="194" r="22" fill="#16324a"/>
  <text x="420" y="203" class="label" fill="#ffffff">b</text>
  <text x="465" y="200" class="title">Coarse screening</text>
  <text x="465" y="228" class="subtitle">1,000-bp windows, 9 site-wise features, MIL pruning</text>

  <rect class="panel-soft" x="420" y="268" width="238" height="178"/>
  <text x="440" y="296" class="tiny">1,000-bp feature matrix V</text>
  <rect x="442" y="316" width="190" height="110" fill="#f8fbff" stroke="#bfd0e0" stroke-width="1.5"/>
  <g>
    <line x1="463" y1="316" x2="463" y2="426" class="matrixLine"/>
    <line x1="484" y1="316" x2="484" y2="426" class="matrixLine"/>
    <line x1="505" y1="316" x2="505" y2="426" class="matrixLine"/>
    <line x1="526" y1="316" x2="526" y2="426" class="matrixLine"/>
    <line x1="547" y1="316" x2="547" y2="426" class="matrixLine"/>
    <line x1="568" y1="316" x2="568" y2="426" class="matrixLine"/>
    <line x1="589" y1="316" x2="589" y2="426" class="matrixLine"/>
    <line x1="610" y1="316" x2="610" y2="426" class="matrixLine"/>
    <line x1="442" y1="338" x2="632" y2="338" class="matrixLine"/>
    <line x1="442" y1="360" x2="632" y2="360" class="matrixLine"/>
    <line x1="442" y1="382" x2="632" y2="382" class="matrixLine"/>
    <line x1="442" y1="404" x2="632" y2="404" class="matrixLine"/>
  </g>
  <rect x="442" y="316" width="42" height="110" class="heat1" opacity=".75"/>
  <rect x="484" y="316" width="42" height="110" class="heat2" opacity=".65"/>
  <rect x="526" y="316" width="42" height="110" class="heat3" opacity=".55"/>
  <rect x="568" y="316" width="42" height="110" class="heat2" opacity=".7"/>
  <rect x="610" y="316" width="22" height="110" class="heat4" opacity=".65"/>
  <text x="440" y="442" class="body">Mismatch, deletion, insertion, clipping, depth</text>

  <rect class="panel-soft" x="420" y="475" width="238" height="176"/>
  <text x="440" y="503" class="tiny">Overlapping 200-bp instances</text>
  <rect x="442" y="528" width="64" height="34" rx="8" class="stageB"/>
  <rect x="480" y="528" width="64" height="34" rx="8" class="stageB" opacity=".85"/>
  <rect x="518" y="528" width="64" height="34" rx="8" class="stageB" opacity=".7"/>
  <rect x="556" y="528" width="64" height="34" rx="8" class="stageB" opacity=".55"/>
  <text x="445" y="550" class="tiny">200 bp</text>
  <text x="515" y="550" class="tiny">100 bp overlap</text>
  <rect x="454" y="586" width="170" height="42" rx="12" fill="#e9f3ff" stroke="#a7c8ea" stroke-width="2"/>
  <text x="486" y="612" class="body">Attentive MIL encoder</text>
  <text x="440" y="672" class="body">Prunes ~90% of normal background</text>
  <text x="440" y="696" class="body">and nominates candidate windows.</text>

  <!-- arrow b->c -->
  <path d="M690 545 C705 545 710 545 730 545" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- c -->
  <circle cx="768" cy="194" r="22" fill="#16324a"/>
  <text x="760" y="203" class="label" fill="#ffffff">c</text>
  <text x="805" y="200" class="title">Sequence-to-image encoding</text>
  <text x="805" y="228" class="subtitle">20 consecutive 50-bp VSP slices per candidate window</text>

  <rect class="panel-soft" x="760" y="270" width="258" height="180"/>
  <text x="780" y="298" class="tiny">Window partitioning</text>
  <rect x="782" y="330" width="214" height="42" rx="10" fill="#edf7ef" stroke="#9fd3b0" stroke-width="2"/>
  <g>
    <line x1="792" y1="330" x2="792" y2="372" class="minor"/>
    <line x1="843" y1="330" x2="843" y2="372" class="minor"/>
    <line x1="894" y1="330" x2="894" y2="372" class="minor"/>
    <line x1="945" y1="330" x2="945" y2="372" class="minor"/>
    <line x1="996" y1="330" x2="996" y2="372" class="minor"/>
  </g>
  <text x="797" y="357" class="tiny">50 bp</text>
  <text x="920" y="357" class="tiny">...</text>
  <text x="962" y="357" class="tiny">20 slices</text>
  <text x="780" y="405" class="body">Each candidate window is split into ordered</text>
  <text x="780" y="429" class="body">50-bp genomic subregions.</text>

  <rect class="panel-soft" x="760" y="480" width="258" height="240"/>
  <text x="780" y="508" class="tiny">Vertical-Site Profile (VSP) image construction</text>
  <rect x="784" y="532" width="78" height="78" class="tile1"/>
  <rect x="872" y="532" width="78" height="78" class="tile2"/>
  <rect x="784" y="620" width="78" height="78" class="tile3"/>
  <rect x="872" y="620" width="78" height="78" class="tile4"/>
  <g>
    <line x1="792" y1="540" x2="852" y2="540" class="matrixLine"/>
    <line x1="792" y1="556" x2="852" y2="556" class="matrixLine"/>
    <line x1="792" y1="572" x2="852" y2="572" class="matrixLine"/>
    <line x1="792" y1="588" x2="852" y2="588" class="matrixLine"/>
    <line x1="800" y1="532" x2="800" y2="610" class="matrixLine"/>
    <line x1="816" y1="532" x2="816" y2="610" class="matrixLine"/>
    <line x1="832" y1="532" x2="832" y2="610" class="matrixLine"/>
  </g>
  <path d="M972 574 C985 574 994 574 1002 574" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="1008" y="536" width="18" height="162" rx="7" fill="#7cb6ff"/>
  <rect x="989" y="536" width="18" height="162" rx="7" fill="#99dbaf"/>
  <rect x="970" y="536" width="18" height="162" rx="7" fill="#f7c680"/>
  <text x="779" y="743" class="body">Twelve feature layers are tiled into a</text>
  <text x="779" y="767" class="body">three-channel tensor for downstream vision.</text>

  <!-- arrow c->d -->
  <path d="M1050 545 C1065 545 1070 545 1090 545" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- d -->
  <circle cx="1128" cy="194" r="22" fill="#16324a"/>
  <text x="1120" y="203" class="label" fill="#ffffff">d</text>
  <text x="1165" y="200" class="title">Spatial-sequential recognition</text>
  <text x="1165" y="228" class="subtitle">Residual CNN + transformer SSR-Net across ordered slices</text>

  <rect class="panel-soft" x="1120" y="272" width="258" height="195"/>
  <text x="1140" y="300" class="tiny">Visual feature extraction</text>
  <rect x="1146" y="328" width="88" height="88" rx="16" fill="#fff5e7" stroke="#f0b868" stroke-width="2"/>
  <rect x="1260" y="328" width="88" height="88" rx="16" fill="#fff1de" stroke="#f0b868" stroke-width="2"/>
  <text x="1168" y="380" class="body">ResNet</text>
  <text x="1275" y="380" class="body">CNN</text>
  <path d="M1235 372 C1245 372 1250 372 1260 372" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="1140" y="447" class="body">Each 50-bp VSP slice is embedded into</text>
  <text x="1140" y="471" class="body">a dense latent representation.</text>

  <rect class="panel-soft" x="1120" y="495" width="258" height="245"/>
  <text x="1140" y="523" class="tiny">Sequential contextual integration</text>
  <g transform="translate(1144,547)">
    <rect x="0" y="0" width="26" height="110" rx="6" fill="#ffdba7"/>
    <rect x="34" y="0" width="26" height="110" rx="6" fill="#ffc86f"/>
    <rect x="68" y="0" width="26" height="110" rx="6" fill="#ffb650"/>
    <rect x="102" y="0" width="26" height="110" rx="6" fill="#ffcb7a"/>
    <rect x="136" y="0" width="26" height="110" rx="6" fill="#ffd79b"/>
    <rect x="170" y="0" width="26" height="110" rx="6" fill="#ffb650"/>
  </g>
  <path d="M1148 674 C1188 710 1232 710 1276 674" class="signal"/>
  <path d="M1182 674 C1218 628 1266 628 1308 674" class="signal2"/>
  <rect x="1194" y="705" width="118" height="24" rx="12" fill="#ffe7c0"/>
  <text x="1212" y="722" class="tiny">Transformer SSR-Net</text>
  <text x="1140" y="767" class="body">Long-range dependencies across adjacent</text>
  <text x="1140" y="791" class="body">segments yield coarse SV type and span.</text>

  <!-- arrow d->e -->
  <path d="M1410 545 C1425 545 1430 545 1450 545" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- e -->
  <circle cx="1488" cy="194" r="22" fill="#16324a"/>
  <text x="1480" y="203" class="label" fill="#ffffff">e</text>
  <text x="1525" y="200" class="title">Breakpoint refinement</text>
  <text x="1525" y="228" class="subtitle">Local assembly, contig realignment, adaptive validation</text>

  <rect class="panel-soft" x="1478" y="274" width="224" height="200"/>
  <text x="1498" y="302" class="tiny">Targeted local assembly</text>
  <line x1="1508" y1="340" x2="1674" y2="340" class="track"/>
  <rect x="1518" y="330" width="50" height="16" rx="8" class="readD"/>
  <rect x="1566" y="330" width="42" height="16" rx="8" class="readC"/>
  <rect x="1608" y="330" width="46" height="16" rx="8" class="readB"/>
  <path d="M1518 384 C1548 356 1572 356 1600 384 S1655 412 1684 384" class="signal4"/>
  <text x="1498" y="428" class="body">Region-specific reads are assembled into</text>
  <text x="1498" y="452" class="body">longer contigs with improved continuity.</text>

  <rect class="panel-soft" x="1478" y="506" width="224" height="248"/>
  <text x="1498" y="534" class="tiny">Adaptive validation and final breakpoint output</text>
  <rect x="1504" y="562" width="172" height="32" rx="10" fill="#fde8ee" stroke="#ef9aa7" stroke-width="2"/>
  <text x="1518" y="583" class="body">size-aware thresholding</text>
  <rect x="1504" y="612" width="172" height="32" rx="10" fill="#fde8ee" stroke="#ef9aa7" stroke-width="2"/>
  <text x="1518" y="633" class="body">CIGAR-consistent validation</text>
  <rect x="1504" y="662" width="172" height="32" rx="10" fill="#fde8ee" stroke="#ef9aa7" stroke-width="2"/>
  <text x="1518" y="683" class="body">split-read / discordant rescue</text>
  <path d="M1558 720 C1580 742 1614 742 1638 720" class="signal3"/>
  <text x="1498" y="779" class="body">Validated events are refined to base-pair</text>
  <text x="1498" y="803" class="body">resolution for final SV reporting.</text>

  <!-- footer relation -->
  <rect x="510" y="894" width="790" height="70" rx="18" fill="#f5f8fb" stroke="#d8e2eb" stroke-width="2"/>
  <text x="548" y="926" class="body">
    SharpSV connects coarse genomic screening, site-centered visual encoding, spatial-sequential recognition,
  </text>
  <text x="548" y="950" class="body">
    and adaptive sequence-level refinement into a unified short-read SV discovery workflow.
  </text>
</svg>
